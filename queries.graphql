query managerData($uuid: UUID!) {
  managers(filter: { uuids: [$uuid], from_date: null, to_date: null }) {
    objects {
      validities {
        employee_uuid
        org_unit_uuid
        validity {
          to
          from
        }
      }
    }
  }
}

query employeeName($uuid: UUID!) {
  employees(filter: { uuids: [$uuid] }) {
    objects {
      current {
        name
      }
    }
  }
}

query orgUnitAncestors($uuid: UUID!) {
  org_units(filter: { uuids: [$uuid]} ) {
    objects {
      current {
        ancestors {
          uuid
          name
        }
        name
      }
    }
  }
}

query orgUnitData($uuid: UUID!) {
  org_units(filter: { uuids: [$uuid] }) {
    objects {
      current {
        name
        user_key
      }
    }
  }
}

query orgUnitRelations($uuid: UUID!) {
  org_units(filter: { uuids: [$uuid] }) {
    objects {
      current {
        uuid
        name
        ancestors {
          uuid
        }
        engagements {
          uuid
        }
        related_units {
          org_units {
            uuid
            ancestors {
              uuid
            }
          }
        }
      }
    }
  }
}

query institutionAddress($uuid: UUID!, $root: UUID!) {
  org_units(
    filter: { parent: { uuids: [$root] }, descendant: { uuids: [$uuid] } }
  ) {
    objects {
      current {
        addresses(filter: { address_type: { scope: "EMAIL" } }) {
          value
        }
      }
    }
  }
}

query orgUnitAddress($uuid: UUID!) {
  org_units(
    filter: { uuids: [$uuid] }
  ) {
    objects {
      current {
        addresses(filter: { address_type: { scope: "EMAIL" } }) {
          value
        }
      }
    }
  }
}

query relatedUnitRegistrations($uuid: UUID!) {
  related_units(filter: { uuids: [$uuid], from_date: null, to_date: null }) {
    objects {
      registrations {
        validities {
          org_units_response {
            objects {
              uuid
            }
          }
        }
      }
    }
  }
}

query rolebinding($uuid: UUID!) {
  rolebindings(filter: {uuids: [$uuid]}) {
    objects {
      current {
        ituser {
          uuid
        }
      }
    }
  }
}


query ituserValidities($uuid: UUID!) {
  itusers(filter: { uuids: [$uuid], from_date: null, to_date: null }) {
    objects {
      validities {
        user_key
        rolebindings {
          role {
            name
            uuid
          }
        }
        person {
          name
          uuid
        }
        itsystem {
          name
          uuid
        }
        validity {
          from
          to
        }
      }
    }
  }
}


